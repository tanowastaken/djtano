<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ NAME | Official Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        /* Reset e Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3 { font-family: 'Syncopate', sans-serif; text-transform: uppercase; }

        /* Sfondo Animato Soft */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0a 100%);
            z-index: -1;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
        }
        nav .logo { font-weight: 700; font-size: 1.5rem; letter-spacing: 2px; color: #00f2ff; }
        nav ul { display: flex; list-style: none; }
        nav ul li { margin-left: 2rem; }
        nav ul li a { color: #fff; text-decoration: none; font-size: 0.8rem; letter-spacing: 1px; transition: 0.3s; }
        nav ul li a:hover { color: #00f2ff; }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 5%;
        }
        .hero h1 { font-size: 5rem; margin-bottom: 1rem; letter-spacing: -2px; }
        .hero p { font-size: 1.2rem; color: #888; max-width: 600px; }
        .cta-button {
            margin-top: 2rem;
            padding: 1rem 2.5rem;
            background: transparent;
            border: 2px solid #00f2ff;
            color: #00f2ff;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
        }
        .cta-button:hover { background: #00f2ff; color: #000; box-shadow: 0 0 20px #00f2ff; }

        /* Tour Dates Section */
        .section { padding: 100px 10%; }
        .tour-list { width: 100%; border-collapse: collapse; margin-top: 40px; }
        .tour-row { border-bottom: 1px solid #222; transition: 0.3s; }
        .tour-row:hover { background: rgba(255, 255, 255, 0.05); }
        .tour-row td { padding: 20px; font-size: 1.1rem; }
        .date { color: #00f2ff; font-weight: bold; width: 20%; }
        .location { width: 60%; }
        .tickets { text-align: right; width: 20%; }
        .btn-sm { text-decoration: none; color: #fff; border: 1px solid #fff; padding: 5px 15px; font-size: 0.7rem; }

        /* Player Placeholder */
        .music-player {
            background: #111;
            padding: 40px;
            text-align: center;
            border-radius: 10px;
            border: 1px solid #222;
        }

        /* Footer */
        footer { padding: 50px 0; text-align: center; border-top: 1px solid #222; margin-top: 50px; }
        .socials a { color: #888; margin: 0 15px; text-decoration: none; font-size: 1.2rem; }
        .socials a:hover { color: #fff; }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 { font-size: 3rem; }
            nav ul { display: none; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <nav>
        <div class="logo">AROUNDTANE</div>
        <ul>
            <li><a href="#music">MUSIC</a></li>
            <li><a href="#tour">TOUR</a></li>
            <li><a href="#contact">CONTACT</a></li>
        </ul>
    </nav>

    <section class="hero">
        <h1>AROUNDTANE</h1>
        <p>Electro House / Tech House / Reggaeton & Urban Latino</p>
    </section>

    <section id="tour" class="section">
        <h2>Prossime Date</h2>
        <table class="tour-list">
            <tr class="tour-row">
                <td class="date">25 APR</td>
                <td class="location">Autoquattro snc</td>
                <td class="tickets"><a href="#" class="btn-sm">TICKETS</a></td>
            </tr>
        </table>
    </section>

    <section id="music" class="section">
        <div class="music-player">
            <h2>SCEGLI LA PROSSIMA MUSICA</h2>

            <div style="height: 150px; background: #222; display: flex; align-items: center; justify-content: center; border-radius: 5px;">
                PAGAMI IT13R0623036240000015335271
            </div>
        </div>
    </section>

    <footer>
        <div class="socials">
            <a href="#">INSTAGRAM</a>
            <a href="#">SOUNDCLOUD</a>
            <a href="#">SPOTIFY</a>
        </div>
        <p style="margin-top: 20px; font-size: 0.7rem; color: #444;">&copy; 2026 AROUNDTANE. All Rights Reserved.</p>
    </footer>

</body>
</html>
