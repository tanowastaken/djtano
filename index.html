<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AROUNDTANE | Official Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        /* Reset e Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3 { font-family: 'Syncopate', sans-serif; text-transform: uppercase; }

        /* Sfondo Animato Soft */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0a 100%);
            z-index: -1;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        nav .logo { font-weight: 700; font-size: 1.2rem; letter-spacing: 2px; color: #00f2ff; }
        nav ul { display: flex; list-style: none; }
        nav ul li { margin-left: 1.5rem; }
        nav ul li a { color: #fff; text-decoration: none; font-size: 0.75rem; letter-spacing: 1px; transition: 0.3s; font-weight: 600; }
        nav ul li a:hover { color: #00f2ff; }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 5%;
        }
        .hero h1 { font-size: clamp(2.5rem, 10vw, 5rem); margin-bottom: 1rem; letter-spacing: -2px; line-height: 1; }
        .hero p { font-size: clamp(0.9rem, 4vw, 1.2rem); color: #888; max-width: 600px; text-transform: uppercase; letter-spacing: 1px; }

        /* Sections */
        .section { padding: 80px 5%; max-width: 1200px; margin: 0 auto; }
        h2 { font-size: 1.5rem; margin-bottom: 30px; border-left: 4px solid #00f2ff; padding-left: 15px; }

        /* Tour Dates - Responsive Table */
        .tour-list { width: 100%; border-collapse: collapse; }
        .tour-row { border-bottom: 1px solid #222; display: flex; flex-wrap: wrap; align-items: center; padding: 15px 0; }
        .tour-row:hover { background: rgba(255, 255, 255, 0.03); }

        .date { color: #00f2ff; font-weight: bold; flex: 1; min-width: 80px; font-size: 1.1rem; }
        .location { flex: 3; min-width: 200px; font-size: 1.1rem; padding: 5px 0; }
        .tickets { flex: 1; text-align: right; min-width: 100px; }

        .btn-sm {
            text-decoration: none;
            color: #00f2ff;
            border: 1px solid #00f2ff;
            padding: 8px 15px;
            font-size: 0.7rem;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }
        .btn-sm:hover { background: #00f2ff; color: #000; }

        /* IBAN Box */
        .music-player {
            background: #111;
            padding: 30px;
            text-align: center;
            border-radius: 15px;
            border: 1px solid #222;
        }
        .iban-box {
            margin-top: 20px;
            padding: 20px;
            background: #000;
            border: 1px dashed #444;
            border-radius: 8px;
            word-wrap: break-word; /* Evita che l'IBAN esca dallo schermo */
            font-family: monospace;
            color: #00f2ff;
            font-size: clamp(0.8rem, 3vw, 1rem);
        }

        /* Footer */
        footer { padding: 40px 5%; text-align: center; border-top: 1px solid #222; }
        .socials { margin-bottom: 20px; }
        .socials a { color: #888; margin: 0 10px; text-decoration: none; font-size: 0.8rem; transition: 0.3s; }
        .socials a:hover { color: #00f2ff; }

        /* Media Queries per Cellulari */
        @media (max-width: 600px) {
            nav { padding: 1rem 5%; }
            nav ul li { margin-left: 1rem; }
            nav ul li a { font-size: 0.65rem; }

            .section { padding: 60px 5%; }

            .tour-row { flex-direction: column; text-align: center; gap: 10px; padding: 25px 0; }
            .tickets { text-align: center; width: 100%; }
            .date { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <nav>
        <div class="logo">AROUNDTANE</div>
        <ul>
            <li><a href="#tour">TOUR</a></li>
            <li><a href="#music">INFO</a></li>
            <li><a href="#contact">SOCIAL</a></li>
        </ul>
    </nav>

    <section class="hero">
        <h1>AROUNDTANE</h1>
        <p>Electro House / Tech House / Reggaeton</p>
    </section>

    <section id="tour" class="section">
        <h2>Prossime Date</h2>
        <div class="tour-list">
            <div class="tour-row">
                <div class="date">25 APR</div>
                <div class="location">Autoquattro snc</div>
                <div class="tickets"><a href="#" class="btn-sm">TICKETS</a></div>
            </div>
            </div>
    </section>

    <section id="music" class="section">
        <div class="music-player">
            <h2>Supporta la Musica</h2>
            <p style="color: #666; font-size: 0.9rem;">Scegli la prossima traccia</p>
            <div class="iban-box">
                PAGAMI : IT13R0623036240000015335271
            </div>
        </div>
    </section>

    <footer id="contact">
        <div class="socials">
            <a href="https://www.instagram.com/lorenzo_lauri.tano/">INSTAGRAM</a>

        </div>
        <p style="font-size: 0.6rem; color: #444; letter-spacing: 1px;">&copy; 2026 AROUNDTANE. ALL RIGHTS RESERVED.</p>
    </footer>

</body>
</html>
